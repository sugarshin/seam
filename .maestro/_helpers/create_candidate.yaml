appId: com.sugarshin.seam
# Required env: candidateName
# Wishlist タブ → FAB → 名前入力 → status を wishlist (default) のまま保存。
# Self-contained: cold-start (launch) してから始めるので、呼び出し側の
# 現在地に依存しない。
---
- runFlow: 'launch.yaml'
- runFlow: 'goto_wishlist.yaml'
- tapOn:
    id: 'fab:add-candidate'
- assertVisible: '購入候補を追加'
- tapOn:
    id: 'field:item-name'
- inputText: ${candidateName}
# blur してキーボードを閉じる。購入候補追加画面は最上部に「URL から取り込み」
# セクション (field:import-url y≈150-188 / btn:import-url y≈218-262) があり、
# 新規アイテム画面で使う 50%,18% (y≈157) だと import-url フィールドを誤って
# focus してしまう (キーボードが閉じず submit に到達できない)。ヘッダー分
# 下げた 50%,33% (y≈288) は ItemForm ScrollView 上部の余白 (基本セクション
# タイトル直前) に着弾し、keyboardShouldPersistTaps='handled' で確実に blur
# できる。CI (software renderer) では特にこの差が失敗に直結していた。
- tapOn:
    point: '50%, 33%'
- waitForAnimationToEnd:
    timeout: 1000
- scrollUntilVisible:
    element:
      id: 'btn:submit'
    direction: DOWN
    timeout: 30000
    speed: 40
    visibilityPercentage: 50
- tapOn:
    id: 'btn:submit'
- extendedWaitUntil:
    visible:
      id: 'card:candidate:.*'
    timeout: 5000
