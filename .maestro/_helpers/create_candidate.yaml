appId: com.sugarshin.seam
# Required env: candidateName
# Wishlist タブ → FAB → 名前入力 → status を wishlist (default) のまま保存。
# Self-contained: cold-start (launch) してから始めるので、呼び出し側の
# 現在地に依存しない。
---
- runFlow: 'launch.yaml'
- runFlow: 'goto_wishlist.yaml'
- tapOn:
    id: 'fab:add-candidate'
- assertVisible: '購入候補を追加'
- tapOn:
    id: 'field:item-name'
- inputText: ${candidateName}
# キーボードは閉じず、submit へ向かう下スクロールで閉じる。購入候補追加画面は
# 最上部に「URL から取り込み」ヘッダーがあり、座標ベースの blur タップ
# (旧 50%,18% は import-url 欄を誤 focus / 50%,33% も CI ではレイアウトずれで
# キーボードが残った) は信頼できない。submit は初期表示で画面外なので
# scrollUntilVisible は必ずスワイプし、ItemForm の keyboardDismissMode='on-drag'
# によりその drag でキーボードが確実に閉じ、submit がキーボード裏に隠れない。
- scrollUntilVisible:
    element:
      id: 'btn:submit'
    direction: DOWN
    timeout: 30000
    speed: 40
    visibilityPercentage: 50
# キーボード dismiss アニメーションが終わってから tap (CI の software renderer
# では特に遅い)。
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: 'btn:submit'
- extendedWaitUntil:
    visible:
      id: 'card:candidate:.*'
    timeout: 5000
