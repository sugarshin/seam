appId: com.sugarshin.seam
# Required env: itemName
# Closet タブ → FAB → 名前入力 → 保存。category は default 't_shirt' のまま、
# status は default 'owned' のまま。
# Self-contained: cold-start (launch) してから始めるので、呼び出し側の
# 現在地に依存しない。
---
- runFlow: 'launch.yaml'
- runFlow: 'goto_closet.yaml'
- tapOn:
    id: 'fab:add-item'
- assertVisible: '新規アイテム'
- tapOn:
    id: 'field:item-name'
- inputText: ${itemName}
# Dismiss the keyboard so it doesn't occlude the submit button. hideKeyboard
# is layout-independent (works regardless of Stack header presence) — unlike
# the older `tapOn point: '50%, 18%'` blur which lands in the form area on
# screens with a Stack header.
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
# scrollDuration を 40 にして CI 上の accessibility tree 更新の遅さに耐え、
# timeout も 30s に倍化。macos-26 runner では 15s では稀に間に合わない。
- scrollUntilVisible:
    element:
      id: 'btn:submit'
    direction: DOWN
    timeout: 30000
    speed: 40
    visibilityPercentage: 50
- tapOn:
    id: 'btn:submit'
- extendedWaitUntil:
    visible:
      id: 'card:item:.*'
    timeout: 5000
