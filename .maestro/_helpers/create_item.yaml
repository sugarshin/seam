appId: com.sugarshin.seam
# Required env: itemName
# Closet タブ → FAB → 名前入力 → 保存。category は default 't_shirt' のまま、
# status は default 'owned' のまま。
# Self-contained: cold-start (launch) してから始めるので、呼び出し側の
# 現在地に依存しない。
---
- runFlow: 'launch.yaml'
- runFlow: 'goto_closet.yaml'
- tapOn:
    id: 'fab:add-item'
- assertVisible: '新規アイテム'
- tapOn:
    id: 'field:item-name'
- inputText: ${itemName}
# Tap a safe header-area spot to blur the input and dismiss the keyboard.
# (hideKeyboard は不可: decimal-pad に Return が無い & 通常キーボードで誤って
# Picker を tap してしまう。50%, 18% は新規アイテム画面では SectionTitle 直前
# に着弾するので keyboardShouldPersistTaps='never' の挙動で blur できる)
- tapOn:
    point: '50%, 18%'
- waitForAnimationToEnd:
    timeout: 1000
# scrollDuration を 40 にして CI 上の accessibility tree 更新の遅さに耐え、
# timeout も 30s に倍化。macos-26 runner では 15s では稀に間に合わない。
- scrollUntilVisible:
    element:
      id: 'btn:submit'
    direction: DOWN
    timeout: 30000
    speed: 40
    visibilityPercentage: 50
- tapOn:
    id: 'btn:submit'
- extendedWaitUntil:
    visible:
      id: 'card:item:.*'
    timeout: 5000
