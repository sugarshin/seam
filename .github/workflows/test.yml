name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo SDK peer alignment
        # Catches drift between installed react / react-native / expo-* and
        # what the active Expo SDK expects. A patch bump that slips past the
        # Renovate `react + react-native` group would fail here at PR time.
        # EXPO_OFFLINE=1 pins the comparison to the bundledNativeModules.json
        # shipped with the installed `expo` package; without it `expo install
        # --check` fetches the latest map from api.expo.dev and CI starts
        # failing the moment Expo publishes a new SDK patch.
        env:
          EXPO_OFFLINE: '1'
        run: pnpm --filter @seam/app exec expo install --check

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build (Metro bundle)
        run: pnpm --filter @seam/app exec expo export --platform ios --output-dir .expo/export-check

      # Maestro flows are skipped here — they need a real iOS simulator which
      # GitHub-hosted ubuntu runners can't provide. Run them locally with the
      # `maestro test .maestro/` command (see README).
