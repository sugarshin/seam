name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60
    outputs:
      version: ${{ steps.meta.outputs.version }}
      ipa_size: ${{ steps.meta.outputs.ipa_size }}
      ipa_sha256: ${{ steps.meta.outputs.ipa_sha256 }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '16.4'

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.9'
          bundler-cache: false

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Verify version match
        run: |
          APP_VERSION=$(node -p "require('./packages/app/app.json').expo.version")
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::app.json version ($APP_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Expo prebuild
        working-directory: packages/app
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: Strip push entitlement
        working-directory: packages/app
        run: node scripts/stripPushEntitlement.mjs

      - name: Cache Pods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/app/ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('pnpm-lock.yaml', 'packages/app/package.json', 'packages/app/app.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        working-directory: packages/app/ios
        env:
          RCT_NEW_ARCH_ENABLED: '1'
          USE_HERMES: '1'
        run: pod install --repo-update

      - name: Cache Xcode DerivedData
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('packages/app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Archive (unsigned)
        working-directory: packages/app/ios
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild \
            -workspace Seam.xcworkspace \
            -scheme Seam \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Seam.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            archive

      - name: Package IPA
        id: package
        working-directory: packages/app/ios
        run: |
          set -euo pipefail
          rm -rf build/Payload
          mkdir -p build/Payload
          ditto --noextattr --noqtn \
            build/Seam.xcarchive/Products/Applications/Seam.app \
            build/Payload/Seam.app
          (cd build && ditto -c -k --keepParent --norsrc \
            Payload \
            "Seam-${{ steps.tag.outputs.tag }}.ipa")
          IPA_PATH="$(pwd)/build/Seam-${{ steps.tag.outputs.tag }}.ipa"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA_PATH"
          file "$IPA_PATH"

      - name: Compute metadata
        id: meta
        run: |
          IPA="${{ steps.package.outputs.ipa_path }}"
          echo "version=${{ steps.tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "ipa_size=$(stat -f%z "$IPA")" >> "$GITHUB_OUTPUT"
          echo "ipa_sha256=$(shasum -a 256 "$IPA" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ipa
          path: ${{ steps.package.outputs.ipa_path }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create release & update source.json
    needs: build-ipa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ipa
          path: artifacts

      - name: Generate changelog
        id: changelog
        env:
          TAG: ${{ needs.build-ipa.outputs.tag }}
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            CHANGES="Initial release."
          else
            CHANGES=$(git log --pretty=format:"- %s" "${PREV}..${TAG}")
          fi
          {
            echo "changes<<__EOF__"
            echo "$CHANGES"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.build-ipa.outputs.tag }}
          name: Seam ${{ needs.build-ipa.outputs.tag }}
          body: ${{ steps.changelog.outputs.changes }}
          files: artifacts/Seam-${{ needs.build-ipa.outputs.tag }}.ipa
          fail_on_unmatched_files: true

      - name: Update docs/source.json
        env:
          VERSION: ${{ needs.build-ipa.outputs.version }}
          IPA_SIZE: ${{ needs.build-ipa.outputs.ipa_size }}
          TAG: ${{ needs.build-ipa.outputs.tag }}
          CHANGES: ${{ steps.changelog.outputs.changes }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/update-source.mjs

      - name: Commit & push source.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/source.json
          if git diff --staged --quiet; then
            echo "No source.json changes"
            exit 0
          fi
          git commit -m "chore(release): update source.json for ${{ needs.build-ipa.outputs.tag }}"
          git push origin HEAD:main
